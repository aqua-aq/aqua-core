name: Build Aqua
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [1.24.2]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: |
          mkdir -p bin/${{ matrix.os }}
          go build -o bin/${{ matrix.os }}/aqua${{ runner.os == 'Windows' && '.exe' || '' }} aqua.go

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: aqua-${{ matrix.os }}
          path: bin/${{ matrix.os }}/