name: Build Aqua

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [1.24.2]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: |
          mkdir -p bin/${{ matrix.os }}
          cd bin/${{ matrix.os }}
          go build ../../../aqua.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aqua-${{ matrix.os }}
          path: bin/${{ matrix.os }}/
